<div class="container">
  <h1>Yapılacaklar Listesi</h1>

  <!-- YENİ GÖREV EKLEME FORMU -->
  <div class="form-alani">
    <input
      type="text"
      placeholder="Başlık"
      [(ngModel)]="yeniTitle" />
    <input
      type="text"
      placeholder="Açıklama"
      [(ngModel)]="yeniDescription" />
    <button (click)="todoEkle()">Ekle</button>
  </div>

  <!-- GÖREV LİSTESİ -->
  <ul class="todo-listesi">
    @for (todo of todos; track todo.id) {
      <li [class.tamamlandi]="todo.isCompleted">

        <!-- DÜZENLEME MODU: bu görev düzenleniyorsa -->
        @if (duzenlenenId === todo.id) {
          <div class="duzen-alani">
            <input type="text" [(ngModel)]="duzenTitle" placeholder="Başlık" />
            <input type="text" [(ngModel)]="duzenDescription" placeholder="Açıklama" />
            <button class="kaydet-btn" (click)="duzenlemeKaydet(todo)">Kaydet</button>
            <button class="iptal-btn" (click)="duzenlemeIptal()">İptal</button>
          </div>
        }

        <!-- NORMAL MOD: bu görev düzenlenmiyorsa -->
        @else {
          <div class="todo-bilgi">
            <input
              type="checkbox"
              [checked]="todo.isCompleted"
              (change)="durumDegistir(todo)" />

            <div class="todo-metin">
              <strong>{{ todo.title }}</strong>
              <p>{{ todo.description }}</p>
              <small>{{ todo.isCompleted ? 'Tamamlandı' : 'Bekliyor' }}</small>
            </div>
          </div>

          <div class="butonlar">
            <button class="duzenle-btn" (click)="duzenlemeBaslat(todo)">Düzenle</button>
            <button class="sil-btn" (click)="todoSil(todo.id)">Sil</button>
          </div>
        }

      </li>
    }
  </ul>
</div>
