<div class="auth-container">
  <h2>Giriş Yap</h2>

  <div class="auth-form">
    <input
      type="text"
      placeholder="Kullanıcı adı"
      [(ngModel)]="username" />

    <div class="password-field">
      <input
        [type]="sifreGoster ? 'text' : 'password'"
        placeholder="Şifre"
        [(ngModel)]="password" />
      <span
        class="toggle-sifre"
        (mouseenter)="sifreGoster = true"
        (mouseleave)="sifreGoster = false"
        (click)="sifreGoster = !sifreGoster">
        @if (sifreGoster) {
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-3.22 4.53M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        } @else {
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        }
      </span>
    </div>

    <button (click)="girisYap()">Giriş Yap</button>

    @if (hataMesaji) {
      <p class="hata">{{ hataMesaji }}</p>
    }

    <p class="link">
      Hesabın yok mu? <a routerLink="/register">Kayıt ol</a>
    </p>
  </div>
</div>
